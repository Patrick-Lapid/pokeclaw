<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>agentdex — world</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&display=swap');

:root {
  --bg: #0f1f0a;
  --panel: #1a2e12;
  --panel-alt: #243a1a;
  --border: #3d5e2a;
  --accent: #f0c040;
  --text: #c8e0b0;
  --text-dim: #6a8a50;
  --hp-green: #48d848;
  --hp-yellow: #f8d830;
  --hp-red: #f85848;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Silkscreen', monospace;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

#game-container {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 0;
}

#game-container canvas {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  cursor: grab;
}

#game-container canvas:active { cursor: grabbing; }

#ui-layer {
  position: absolute;
  inset: 0;
  z-index: 10;
  pointer-events: none;
}

#ui-layer > * {
  pointer-events: auto;
}

#topbar {
  height: 40px;
  background: rgba(15, 31, 10, 0.88);
  border-bottom: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  backdrop-filter: blur(2px);
}

.logo {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  color: var(--accent);
  letter-spacing: 2px;
  display: flex;
  align-items: center;
}

.subtitle {
  font-family: 'Silkscreen', monospace;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0;
  margin-left: 12px;
}

.status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  color: var(--text-dim);
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #555;
  transition: background 0.3s;
}

.status-dot.connected {
  background: var(--hp-green);
}

#encounter-count {
  position: absolute;
  top: 50px;
  left: 12px;
  font-family: 'Silkscreen', monospace;
  font-size: 9px;
  color: var(--text-dim);
  background: rgba(15, 31, 10, 0.7);
  padding: 3px 8px;
  border-radius: 3px;
}

#zoom-controls {
  position: absolute;
  top: 50px;
  right: 12px;
  display: flex;
  gap: 4px;
}

#zoom-controls button {
  width: 28px;
  height: 28px;
  background: rgba(15, 31, 10, 0.88);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--accent);
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(2px);
}

#zoom-controls button:hover {
  background: rgba(36, 58, 26, 0.92);
}

#party-bar {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 94%;
}

.party-member {
  background: rgba(15, 31, 10, 0.88);
  border: 2px solid var(--border);
  border-radius: 4px;
  padding: 4px 8px 4px 4px;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  min-width: 130px;
  backdrop-filter: blur(2px);
}

.party-member:hover { background: rgba(36, 58, 26, 0.92) }
.party-member.selected { border-color: var(--accent); box-shadow: 0 0 6px rgba(240, 192, 64, 0.3) }

.party-portrait {
  width: 40px;
  height: 40px;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  flex-shrink: 0;
  border-radius: 2px;
  background: var(--bg);
  border: 1px solid var(--border);
}

.party-info { display: flex; flex-direction: column; gap: 2px; min-width: 0 }
.party-name { font-size: 8px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis }
.party-level { font-size: 7px; color: var(--text-dim) }
.party-hp { width: 48px; height: 4px; background: #1a1a1a; border-radius: 2px; overflow: hidden }
.party-hp-fill { height: 100%; border-radius: 2px; transition: width 0.3s }
.party-status { font-size: 7px; color: var(--text-dim); max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
</style>
</head>
<body>

<div id="game-container"></div>

<div id="ui-layer">
  <div id="topbar">
    <div class="logo">AGENTDEX <span class="subtitle">a pokedex for your claude agents</span></div>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">connecting...</span>
    </div>
  </div>
  <div id="encounter-count"></div>
  <div id="zoom-controls">
    <button id="zoomIn">+</button>
    <button id="zoomOut">-</button>
  </div>
  <div id="party-bar"></div>
</div>

<script>
// ── Hosted page overrides ───────────────────────────────────────────────────
// Assets are served from the same origin for local dev,
// but for production deploy, set ASSET_BASE to the raw GitHub/CDN URL.
var ASSET_BASE = '';
</script>
<script src="/js/game.js"></script>
<script>
// ── Override board area for hosted multi-user rooms ─────────────────────────
BOARD_COL_MIN = 5
BOARD_COL_MAX = 44
BOARD_ROW_MIN = 2
BOARD_ROW_MAX = 29

// Generate 50 nests spread across the expanded area
NESTS = []
for (var nr = 0; nr < 5; nr++) {
  for (var nc = 0; nc < 10; nc++) {
    NESTS.push({
      id:       'nest-' + (nr * 10 + nc),
      col:      8  + nc * 4,
      row:      4  + nr * 5,
      dir:      ['down', 'right', 'left', 'up'][Math.floor(Math.random() * 4)],
      assigned: false
    })
  }
}

// ── Override connectWS to use PartyKit ──────────────────────────────────────
function connectWS() {
  // Parse room from URL:
  // agentdex.gg/world        → room = 'global'
  // agentdex.gg/room/myteam  → room = 'myteam'
  var parts = location.pathname.split('/')
  var room  = parts[1] === 'room' ? (parts[2] || 'global') : 'global'

  var wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:'
  var url = wsProto + '//' + location.host + '/party/' + room
  ws = new WebSocket(url)

  ws.onopen = function() {
    document.getElementById('statusDot').className  = 'status-dot connected'
    document.getElementById('statusText').textContent = 'connected'
  }

  ws.onmessage = function(e) {
    try {
      var msg = JSON.parse(e.data)

      // Handle world_init: spawn all existing creatures at once
      if (msg.type === 'world_init') {
        msg.agents.forEach(function(agent) {
          handleMsg({
            type:         'session_discovered',
            sessionId:    agent.sessionId,
            speciesIndex: agent.speciesIndex,
            xp:           agent.xp,
            username:     agent.username
          })
        })
        return
      }

      handleMsg(msg)
    } catch (err) {}
  }

  ws.onclose = function() {
    document.getElementById('statusDot').className  = 'status-dot'
    document.getElementById('statusText').textContent = 'disconnected'
    setTimeout(connectWS, 2000)
  }

  ws.onerror = function() {
    try { ws.close() } catch (err) {}
  }
}

// Remove the setup overlay check (no local server for hosted page)
// Re-init with the new board bounds
camera.x = ((BOARD_COL_MIN + BOARD_COL_MAX) / 2 + 0.5) * TILE
camera.y = ((BOARD_ROW_MIN + BOARD_ROW_MAX) / 2 + 0.5) * TILE
clampCamera()
</script>
</body>
</html>
