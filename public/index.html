<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>agentdex</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&display=swap');

:root {
  --bg: #0f1f0a;
  --panel: #1a2e12;
  --panel-alt: #243a1a;
  --border: #3d5e2a;
  --accent: #f0c040;
  --text: #c8e0b0;
  --text-dim: #6a8a50;
  --hp-green: #48d848;
  --hp-yellow: #f8d830;
  --hp-red: #f85848;
}

* { margin: 0; padding: 0; box-sizing: border-box; cursor: url('/assets/cursor-hover.png') 4 2, auto }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Silkscreen', monospace;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

#game-container canvas { cursor: url('/assets/cursor-grab.png') 12 12, grab }
#game-container canvas:active { cursor: url('/assets/cursor-grabbing.png') 12 12, grabbing }

#game-container {
  position: absolute;
  top: 42px;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 0;
}

#game-container canvas {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

#ui-layer {
  position: absolute;
  inset: 0;
  z-index: 10;
  pointer-events: none;
}

#ui-layer > * {
  pointer-events: auto;
}

#topbar {
  height: 40px;
  background: var(--panel);
  border-bottom: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
}

.logo {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  color: var(--accent);
  letter-spacing: 2px;
  display: flex;
  align-items: center;
}

.subtitle {
  font-family: 'Silkscreen', monospace;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0;
  margin-left: 12px;
}

.status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  color: var(--text-dim);
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #555;
  transition: background 0.3s;
}

.status-dot.connected {
  background: var(--hp-green);
}

#encounter-count {
  position: absolute;
  top: 48px;
  left: 12px;
  font-family: 'Silkscreen', monospace;
  font-size: 9px;
  color: var(--text-dim);
}

#zoom-controls {
  position: absolute;
  top: 48px;
  right: 12px;
  display: flex;
  gap: 4px;
}

#zoom-controls button {
  width: 28px;
  height: 28px;
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--accent);
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  cursor: url('/assets/cursor-hover.png') 4 2, pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

#zoom-controls button:hover {
  background: var(--panel-alt);
}

#party-bar {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 90%;
}

.party-member {
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 4px 8px;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: url('/assets/cursor-hover.png') 4 2, pointer;
  min-width: 120px;
}

.party-member:hover { background: var(--panel-alt) }
.party-member.selected { border-color: var(--accent) }

.party-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.party-info { display: flex; flex-direction: column; gap: 1px }
.party-name { font-size: 7px; font-weight: bold }
.party-level { font-size: 6px; color: var(--text-dim) }
.party-hp { width: 40px; height: 4px; background: #1a1a1a; border-radius: 2px; overflow: hidden }
.party-hp-fill { height: 100%; border-radius: 2px; transition: width 0.3s }
.party-status { font-size: 6px; color: var(--text-dim); max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }

#setup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

#setup-overlay.visible { display: flex }

#setup-box {
  background: var(--panel);
  border: 2px solid var(--border);
  padding: 24px;
  max-width: 600px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
}

#setup-box h2 {
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  color: var(--accent);
  margin-bottom: 12px;
}

#setup-box p {
  font-size: 11px;
  line-height: 1.6;
  margin-bottom: 12px;
}

#setup-box pre {
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 12px;
  font-size: 9px;
  overflow-x: auto;
  margin-bottom: 12px;
  white-space: pre-wrap;
  word-break: break-all;
}

#setup-box button {
  background: var(--accent);
  color: var(--bg);
  border: none;
  padding: 8px 16px;
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  cursor: url('/assets/cursor-hover.png') 4 2, pointer;
  margin-right: 8px;
}

#setup-box button:hover { opacity: 0.85 }

#setup-box .close-btn {
  background: var(--panel-alt);
  color: var(--text);
  border: 1px solid var(--border);
}
</style>
</head>
<body>

<div id="game-container"></div>

<div id="ui-layer">
  <div id="topbar">
    <div class="logo">AGENTDEX <span class="subtitle">a pokedex for your claude agents</span></div>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">connecting...</span>
    </div>
  </div>
  <div id="encounter-count"></div>
  <div id="zoom-controls">
    <button id="zoomIn">+</button>
    <button id="zoomOut">-</button>
  </div>
  <div id="party-bar"></div>
</div>

<div id="setup-overlay">
  <div id="setup-box">
    <h2>HOOKS SETUP</h2>
    <p>Add this to <strong>~/.claude/settings.json</strong> for real-time creature reactions:</p>
    <pre id="hooks-config-pre">Loading...</pre>
    <button id="copy-btn">COPY</button>
    <button class="close-btn" id="close-setup">DISMISS</button>
  </div>
</div>

<script src="/js/game.js"></script>
</body>
</html>
