<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>agentdex</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&display=swap');

:root {
  --bg: #0f1f0a;
  --panel: #1a2e12;
  --panel-alt: #243a1a;
  --border: #3d5e2a;
  --accent: #f0c040;
  --text: #c8e0b0;
  --text-dim: #6a8a50;
  --hp-green: #48d848;
  --hp-yellow: #f8d830;
  --hp-red: #f85848;
}

* { margin: 0; padding: 0; box-sizing: border-box }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Silkscreen', monospace;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

#topbar {
  height: 40px;
  background: var(--panel);
  border-bottom: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  flex-shrink: 0;
}

.logo {
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  color: var(--accent);
  letter-spacing: 2px;
  display: flex;
  align-items: center;
}

.subtitle {
  font-family: 'Silkscreen', monospace;
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0;
  margin-left: 12px;
}

.status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  color: var(--text-dim);
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #f85848;
}

.status-dot.connected {
  background: var(--hp-green);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1 }
  50% { opacity: 0.35 }
}

#canvas-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}

canvas {
  display: block;
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
  cursor: grab;
}

canvas:active { cursor: grabbing }

#encounter-count {
  position: absolute;
  top: 8px;
  left: 12px;
  font-family: 'Silkscreen', monospace;
  font-size: 9px;
  color: var(--text-dim);
  pointer-events: none;
}

#zoom-controls {
  position: absolute;
  top: 8px;
  right: 12px;
  display: flex;
  gap: 4px;
}

#zoom-controls button {
  width: 28px;
  height: 28px;
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--accent);
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

#zoom-controls button:hover {
  background: var(--panel-alt);
}

#party-bar {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 90%;
}

.party-member {
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 4px 8px;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  min-width: 120px;
}

.party-member:hover { background: var(--panel-alt) }
.party-member.selected { border-color: var(--accent) }

.party-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.party-info { display: flex; flex-direction: column; gap: 1px }
.party-name { font-size: 7px; font-weight: bold }
.party-level { font-size: 6px; color: var(--text-dim) }
.party-hp { width: 40px; height: 4px; background: #1a1a1a; border-radius: 2px; overflow: hidden }
.party-hp-fill { height: 100%; border-radius: 2px; transition: width 0.3s }
.party-status { font-size: 6px; color: var(--text-dim); max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }

#setup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

#setup-overlay.visible { display: flex }

#setup-box {
  background: var(--panel);
  border: 2px solid var(--border);
  padding: 24px;
  max-width: 600px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
}

#setup-box h2 {
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  color: var(--accent);
  margin-bottom: 12px;
}

#setup-box p {
  font-size: 11px;
  line-height: 1.6;
  margin-bottom: 12px;
}

#setup-box pre {
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 12px;
  font-size: 9px;
  overflow-x: auto;
  margin-bottom: 12px;
  white-space: pre-wrap;
  word-break: break-all;
}

#setup-box button {
  background: var(--accent);
  color: var(--bg);
  border: none;
  padding: 8px 16px;
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  cursor: pointer;
  margin-right: 8px;
}

#setup-box button:hover { opacity: 0.85 }

#setup-box .close-btn {
  background: var(--panel-alt);
  color: var(--text);
  border: 1px solid var(--border);
}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">AGENTDEX <span class="subtitle">a pokedex for your claude agents</span></div>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">connecting...</span>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="game"></canvas>
  <div id="encounter-count"></div>
  <div id="zoom-controls">
    <button id="zoomIn">+</button>
    <button id="zoomOut">-</button>
  </div>
  <div id="party-bar"></div>
</div>

<div id="setup-overlay">
  <div id="setup-box">
    <h2>HOOKS SETUP</h2>
    <p>Add this to <strong>~/.claude/settings.json</strong> for real-time creature reactions:</p>
    <pre id="hooks-config-pre">Loading...</pre>
    <button id="copy-btn">COPY</button>
    <button class="close-btn" id="close-setup">DISMISS</button>
  </div>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────

var TILE = 16
var COLS = 24
var ROWS = 16
var WALK_SPEED = 38
var WALK_FRAME_DUR = 0.18
var IDLE_FRAME_DUR = 0.45
var WORK_FRAME_DUR = 0.22
var WANDER_PAUSE_MIN = 3
var WANDER_PAUSE_MAX = 9
var WANDER_LIMIT_MIN = 2
var WANDER_LIMIT_MAX = 5
var REST_MIN = 5
var REST_MAX = 12

// ── Species ──────────────────────────────────────────────────────────────────

var SPECIES = [
  { name: 'Bytox', type: 'fire', body: '#d85020', belly: '#f0a050', eye: '#ffffff', pupil: '#201008', accent: '#f06030', mark: '#f8c848' },
  { name: 'Looplet', type: 'water', body: '#3088d0', belly: '#70c0f0', eye: '#ffffff', pupil: '#102040', accent: '#2070b0', mark: '#90d8f8' },
  { name: 'Parsly', type: 'grass', body: '#40a030', belly: '#80d068', eye: '#ffffff', pupil: '#0a200a', accent: '#308020', mark: '#60c048' },
  { name: 'Sparkode', type: 'electric', body: '#f0d020', belly: '#f8e878', eye: '#ffffff', pupil: '#302800', accent: '#c8a800', mark: '#f85848' },
  { name: 'Nullgeist', type: 'psychic', body: '#9058c0', belly: '#c090e0', eye: '#ffffff', pupil: '#f02020', accent: '#7040a0', mark: '#e060d0' },
  { name: 'Ferrix', type: 'steel', body: '#8898a8', belly: '#b0c0c8', eye: '#ffffff', pupil: '#1a2028', accent: '#606878', mark: '#c8d0d8' },
  { name: 'Terrabyt', type: 'ground', body: '#a07848', belly: '#c8a878', eye: '#ffffff', pupil: '#201808', accent: '#806030', mark: '#d0b080' },
  { name: 'Glitchfin', type: 'dark', body: '#383040', belly: '#585060', eye: '#f02020', pupil: '#f890c0', accent: '#282030', mark: '#a040f0' }
]

var TYPE_COLORS = {
  fire: '#f06030', water: '#3088d0', grass: '#40a030', electric: '#f0d020',
  psychic: '#9058c0', steel: '#8898a8', ground: '#a07848', dark: '#585060'
}

// ── Nest positions ───────────────────────────────────────────────────────────

var NESTS = [
  { id: 'nest-0', col: 2, row: 2, dir: 'DOWN', assigned: false },
  { id: 'nest-1', col: 4, row: 2, dir: 'DOWN', assigned: false },
  { id: 'nest-2', col: 6, row: 2, dir: 'DOWN', assigned: false },
  { id: 'nest-3', col: 3, row: 3, dir: 'DOWN', assigned: false },
  { id: 'nest-4', col: 5, row: 3, dir: 'DOWN', assigned: false },
  { id: 'nest-5', col: 2, row: 4, dir: 'RIGHT', assigned: false },
  { id: 'nest-6', col: 4, row: 4, dir: 'DOWN', assigned: false },
  { id: 'nest-7', col: 6, row: 4, dir: 'LEFT', assigned: false },
  { id: 'nest-8', col: 3, row: 5, dir: 'DOWN', assigned: false },
  { id: 'nest-9', col: 5, row: 5, dir: 'DOWN', assigned: false }
]

// ── Tile map ─────────────────────────────────────────────────────────────────

var tileMap = []
var blocked = new Set()

function initTileMap() {
  for (var r = 0; r < ROWS; r++) {
    tileMap[r] = []
    for (var c = 0; c < COLS; c++) {
      if (r === 0 || r === ROWS - 1 || c === 0 || c === COLS - 1) {
        tileMap[r][c] = 0 // border trees
      } else {
        tileMap[r][c] = 1 // grass
      }
    }
  }

  // Horizontal path rows 7-8
  for (var c = 1; c < COLS - 1; c++) {
    tileMap[7][c] = 2
    tileMap[8][c] = 2
  }

  // Vertical path cols 11-12
  for (var r = 1; r < ROWS - 1; r++) {
    tileMap[r][11] = 2
    tileMap[r][12] = 2
  }

  // Tall grass patches: [col, row, width, height]
  var tallGrassPatches = [[2,2,5,4],[17,2,5,4],[2,10,5,4],[17,10,5,4]]
  for (var p = 0; p < tallGrassPatches.length; p++) {
    var patch = tallGrassPatches[p]
    for (var dr = 0; dr < patch[3]; dr++) {
      for (var dc = 0; dc < patch[2]; dc++) {
        var pr = patch[1] + dr, pc = patch[0] + dc
        if (pr > 0 && pr < ROWS - 1 && pc > 0 && pc < COLS - 1 && tileMap[pr][pc] === 1) {
          tileMap[pr][pc] = 3
        }
      }
    }
  }

  // Pond: cols 9-14, rows 2-4
  var pondTiles = [
    [10,2],[11,2],[12,2],[13,2],
    [9,3],[10,3],[11,3],[12,3],[13,3],[14,3],
    [10,4],[11,4],[12,4],[13,4]
  ]
  for (var i = 0; i < pondTiles.length; i++) {
    tileMap[pondTiles[i][1]][pondTiles[i][0]] = 4
  }

  // Scattered trees
  var trees = [[4,6],[8,1],[15,1],[20,6],[4,9],[19,9],[8,13],[15,13],[16,6],[7,9],[16,9]]
  for (var i = 0; i < trees.length; i++) {
    tileMap[trees[i][1]][trees[i][0]] = 0
  }

  // Rocks (blocked but tile stays as grass)
  var rocks = [[10,6],[13,6],[10,9],[13,9],[8,8]]
  for (var i = 0; i < rocks.length; i++) {
    blocked.add(rocks[i][0] + ',' + rocks[i][1])
  }
}

// ── BFS pathfinding ──────────────────────────────────────────────────────────

function isWalkable(col, row) {
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return false
  var t = tileMap[row][col]
  if (t === 0 || t === 4) return false
  if (blocked.has(col + ',' + row)) return false
  return true
}

function findPath(startCol, startRow, endCol, endRow) {
  if (startCol === endCol && startRow === endRow) return []
  if (!isWalkable(endCol, endRow)) return []

  var queue = [[startCol, startRow]]
  var visited = new Set()
  visited.add(startCol + ',' + startRow)
  var parent = new Map()

  var dirs = [[0,-1],[0,1],[-1,0],[1,0]]

  while (queue.length > 0) {
    var cur = queue.shift()
    var cx = cur[0], cy = cur[1]

    if (cx === endCol && cy === endRow) {
      var path = []
      var key = endCol + ',' + endRow
      while (parent.has(key)) {
        var parts = key.split(',')
        path.unshift({ col: parseInt(parts[0]), row: parseInt(parts[1]) })
        key = parent.get(key)
      }
      return path
    }

    for (var d = 0; d < dirs.length; d++) {
      var nx = cx + dirs[d][0], ny = cy + dirs[d][1]
      var nk = nx + ',' + ny
      if (!visited.has(nk) && isWalkable(nx, ny)) {
        visited.add(nk)
        parent.set(nk, cx + ',' + cy)
        queue.push([nx, ny])
      }
    }
  }

  return []
}

// ── Creatures ────────────────────────────────────────────────────────────────

var creatures = new Map()
var removalTimers = new Map() // sessionId → timeout handle
var endedSessions = new Set() // sessions that have ended
var selectedId = null

function createCreature(sessionId, speciesIndex) {
  if (creatures.has(sessionId)) return creatures.get(sessionId)

  var idx = (typeof speciesIndex === 'number') ? speciesIndex : 0
  var sp = SPECIES[idx % SPECIES.length]

  // Find unassigned nest
  var nest = null
  for (var i = 0; i < NESTS.length; i++) {
    if (!NESTS[i].assigned) {
      nest = NESTS[i]
      nest.assigned = true
      break
    }
  }

  var startCol = nest ? nest.col : 12
  var startRow = nest ? nest.row : 8

  var cr = {
    id: sessionId,
    species: sp,
    nest: nest,
    state: 'WORK',
    dir: nest ? nest.dir : 'DOWN',
    frame: 0,
    frameTimer: 0,
    x: startCol * TILE + TILE / 2,
    y: startRow * TILE + TILE / 2,
    col: startCol,
    row: startRow,
    path: [],
    moveProgress: 0,
    isActive: true,
    statusText: 'ready!',
    xp: 0,
    level: 1,
    wanderTimer: randRange(WANDER_PAUSE_MIN, WANDER_PAUSE_MAX),
    wanderCount: 0,
    wanderLimit: randRange(WANDER_LIMIT_MIN, WANDER_LIMIT_MAX),
    restTimer: 0,
    bubbleType: null,
    bubbleTimer: 0
  }

  creatures.set(sessionId, cr)
  updatePartyBar()
  updateEncounterCount()
  return cr
}

function removeCreature(sessionId) {
  var cr = creatures.get(sessionId)
  if (!cr) return
  cancelRemovalTimer(sessionId)
  if (cr.nest) cr.nest.assigned = false
  creatures.delete(sessionId)
  if (selectedId === sessionId) selectedId = null
  updatePartyBar()
  updateEncounterCount()
}

var REMOVAL_DELAY = 30000 // 30s after stop with no new activity

function scheduleRemoval(sessionId) {
  cancelRemovalTimer(sessionId)
  removalTimers.set(sessionId, setTimeout(function() {
    removalTimers.delete(sessionId)
    removeCreature(sessionId)
  }, REMOVAL_DELAY))
}

function cancelRemovalTimer(sessionId) {
  var t = removalTimers.get(sessionId)
  if (t) { clearTimeout(t); removalTimers.delete(sessionId) }
}

function randRange(min, max) {
  return min + Math.random() * (max - min)
}

// ── Sprite cache & drawing ───────────────────────────────────────────────────

var spriteCache = new Map()

function drawCreature(sp, state, dir, frame) {
  var key = sp.name + '-' + state + '-' + dir + '-' + frame
  if (spriteCache.has(key)) return spriteCache.get(key)

  var c = document.createElement('canvas')
  c.width = 16; c.height = 16
  var g = c.getContext('2d')

  var bounce = (state === 'IDLE' && frame % 2 === 1) ? -1 : 0
  var squish = (state === 'WORK' && frame % 2 === 1) ? 1 : 0

  // Shadow
  g.fillStyle = 'rgba(0,0,0,0.25)'
  g.beginPath()
  g.ellipse(8, 15, 5, 1.5, 0, 0, Math.PI * 2)
  g.fill()

  var bodyTop = 5 + bounce + squish
  var bodyBot = 13
  var bodyLeft = 4
  var bodyRight = 12
  var bellyTop = 8 + bounce
  var bellyBot = 12

  // Type-specific body shapes
  if (sp.name === 'Nullgeist') {
    bodyLeft = 3; bodyRight = 13 // wider
  } else if (sp.name === 'Ferrix') {
    bodyLeft = 3; bodyRight = 13 // angular wide
  } else if (sp.name === 'Terrabyt') {
    bodyLeft = 3; bodyRight = 13; bodyTop = 6 + bounce + squish // chunky
  } else if (sp.name === 'Glitchfin') {
    bellyTop = 9 + bounce; bellyBot = 12 // narrow belly
  }

  // Body
  g.fillStyle = sp.body
  g.fillRect(bodyLeft, bodyTop, bodyRight - bodyLeft, bodyBot - bodyTop)

  // Belly
  g.fillStyle = sp.belly
  g.fillRect(bodyLeft + 2, bellyTop, bodyRight - bodyLeft - 4, bellyBot - bellyTop)

  // ── Type features ──
  if (sp.name === 'Bytox') {
    // Flame tail
    var fx = dir === 'LEFT' ? bodyRight - 1 : dir === 'RIGHT' ? bodyLeft - 2 : bodyRight - 1
    var fy = bodyTop + 1 + bounce
    g.fillStyle = '#f08030'
    g.fillRect(fx, fy, 2, 3)
    g.fillStyle = (frame % 2 === 0) ? '#f8c848' : '#f06030'
    g.fillRect(fx, fy - 1, 2, 2)
  }

  if (sp.name === 'Looplet') {
    // Water crest
    g.fillStyle = sp.accent
    g.fillRect(6, bodyTop - 2 + bounce, 4, 2)
    g.fillRect(7, bodyTop - 3 + bounce, 2, 1)
  }

  if (sp.name === 'Parsly') {
    // Leaf crown
    g.fillStyle = '#1a6010'
    g.fillRect(5, bodyTop - 2 + bounce, 6, 2)
    g.fillStyle = sp.mark
    g.fillRect(6, bodyTop - 3 + bounce, 4, 2)
    g.fillStyle = '#50e030'
    g.fillRect(7, bodyTop - 4 + bounce, 2, 1)
  }

  if (sp.name === 'Sparkode') {
    // Pointed ears
    g.fillStyle = sp.body
    g.fillRect(3, bodyTop - 2 + bounce, 2, 3)
    g.fillRect(11, bodyTop - 2 + bounce, 2, 3)
    g.fillStyle = '#201008'
    g.fillRect(3, bodyTop - 2 + bounce, 2, 1)
    g.fillRect(11, bodyTop - 2 + bounce, 2, 1)
    // Red cheeks
    g.fillStyle = sp.mark
    g.fillRect(bodyLeft, 9 + bounce, 2, 1)
    g.fillRect(bodyRight - 2, 9 + bounce, 2, 1)
  }

  if (sp.name === 'Nullgeist') {
    // Third eye
    g.fillStyle = sp.mark
    g.fillRect(7, bodyTop + 1, 2, 1)
    // Glow during work
    if (state === 'WORK') {
      g.fillStyle = 'rgba(180,100,240,0.15)'
      g.fillRect(bodyLeft - 1, bodyTop - 1, bodyRight - bodyLeft + 2, bodyBot - bodyTop + 2)
    }
  }

  if (sp.name === 'Ferrix') {
    // Armor plates
    g.fillStyle = sp.accent
    g.fillRect(bodyLeft, bodyTop + 1, 1, bodyBot - bodyTop - 2)
    g.fillRect(bodyRight - 1, bodyTop + 1, 1, bodyBot - bodyTop - 2)
    g.fillRect(6, bodyTop - 1 + bounce, 4, 1) // head ridge
  }

  if (sp.name === 'Terrabyt') {
    // Rocky bumps
    g.fillStyle = sp.accent
    g.fillRect(5, bodyTop - 1 + bounce, 2, 2)
    g.fillRect(6, bodyTop - 2 + bounce, 1, 1)
    g.fillRect(9, bodyTop - 1 + bounce, 2, 1)
    g.fillRect(9, bodyTop + bounce, 3, 1)
  }

  if (sp.name === 'Glitchfin') {
    // Cycling glitch lines
    g.fillStyle = sp.mark
    var glitchY = [bodyTop + 2, bodyTop + 4, bodyTop + 6]
    var gy = glitchY[frame % 3] || glitchY[0]
    if (gy < bodyBot) {
      g.fillRect(bodyLeft + 1, gy, bodyRight - bodyLeft - 2, 1)
    }
  }

  // ── Eyes ──
  if (dir !== 'UP') {
    var eyeOffX = dir === 'LEFT' ? -1 : dir === 'RIGHT' ? 1 : 0
    var eyeY = 7 + bounce

    g.fillStyle = sp.eye
    g.fillRect(5 + eyeOffX, eyeY, 2, 2)
    g.fillRect(9 + eyeOffX, eyeY, 2, 2)

    g.fillStyle = sp.pupil
    var pupilOffX = dir === 'LEFT' ? 0 : dir === 'RIGHT' ? 1 : 0
    var pupilOffY = dir === 'DOWN' ? 1 : 0
    g.fillRect(5 + eyeOffX + pupilOffX, eyeY + pupilOffY, 1, 1)
    g.fillRect(9 + eyeOffX + pupilOffX, eyeY + pupilOffY, 1, 1)
  }

  // ── Feet ──
  g.fillStyle = sp.accent
  var footY = bodyBot
  var leftFootOff = 0, rightFootOff = 0
  if (state === 'WALK') {
    leftFootOff = (frame % 4 < 2) ? -1 : 0
    rightFootOff = (frame % 4 < 2) ? 0 : -1
  }
  g.fillRect(bodyLeft + 1, footY + leftFootOff, 3, 2)
  g.fillRect(bodyRight - 4, footY + rightFootOff, 3, 2)

  // ── Work sparkles ──
  if (state === 'WORK') {
    var sparklePositions = [
      [2, bodyTop - 2], [13, bodyTop], [3, bodyBot + 1], [12, bodyBot - 1]
    ]
    var si = frame % 4
    g.fillStyle = '#ffffff'
    g.fillRect(sparklePositions[si][0], sparklePositions[si][1], 1, 1)
    var si2 = (frame + 2) % 4
    g.fillStyle = sp.mark
    g.fillRect(sparklePositions[si2][0], sparklePositions[si2][1], 1, 1)
  }

  spriteCache.set(key, c)
  return c
}

// ── Update creature state machine ────────────────────────────────────────────

function updateCreature(cr, dt) {
  cr.frameTimer += dt

  if (cr.bubbleTimer > 0) {
    cr.bubbleTimer -= dt
    if (cr.bubbleTimer <= 0) cr.bubbleType = null
  }

  if (cr.state === 'WORK') {
    if (cr.frameTimer >= WORK_FRAME_DUR) {
      cr.frameTimer = 0
      cr.frame = (cr.frame + 1) % 4
    }
    if (!cr.isActive) {
      if (cr.restTimer === -1) {
        cr.state = 'IDLE'
        cr.frame = 0
        cr.frameTimer = 0
        cr.wanderTimer = randRange(WANDER_PAUSE_MIN, WANDER_PAUSE_MAX)
      } else {
        cr.restTimer -= dt
        if (cr.restTimer <= 0) {
          cr.state = 'IDLE'
          cr.frame = 0
          cr.frameTimer = 0
          cr.wanderTimer = randRange(WANDER_PAUSE_MIN, WANDER_PAUSE_MAX)
        }
      }
    }
    return
  }

  if (cr.state === 'IDLE') {
    if (cr.frameTimer >= IDLE_FRAME_DUR) {
      cr.frameTimer = 0
      cr.frame = (cr.frame + 1) % 2
    }
    if (cr.isActive) {
      if (cr.nest) {
        cr.path = findPath(cr.col, cr.row, cr.nest.col, cr.nest.row)
        if (cr.path.length > 0) {
          cr.state = 'WALK'
          cr.frame = 0
          cr.moveProgress = 0
        } else {
          cr.state = 'WORK'
          cr.frame = 0
          if (cr.nest) cr.dir = cr.nest.dir
        }
      } else {
        cr.state = 'WORK'
        cr.frame = 0
      }
      return
    }
    cr.wanderTimer -= dt
    if (cr.wanderTimer <= 0) {
      if (cr.wanderCount >= cr.wanderLimit && cr.nest) {
        cr.path = findPath(cr.col, cr.row, cr.nest.col, cr.nest.row)
      } else {
        // Pick random walkable tile
        var attempts = 0
        while (attempts < 20) {
          var rc = 1 + Math.floor(Math.random() * (COLS - 2))
          var rr = 1 + Math.floor(Math.random() * (ROWS - 2))
          if (isWalkable(rc, rr)) {
            cr.path = findPath(cr.col, cr.row, rc, rr)
            if (cr.path.length > 0 && cr.path.length < 15) break
          }
          attempts++
        }
        cr.wanderCount++
      }
      if (cr.path && cr.path.length > 0) {
        cr.state = 'WALK'
        cr.frame = 0
        cr.moveProgress = 0
      }
      cr.wanderTimer = randRange(WANDER_PAUSE_MIN, WANDER_PAUSE_MAX)
    }
    return
  }

  if (cr.state === 'WALK') {
    if (cr.frameTimer >= WALK_FRAME_DUR) {
      cr.frameTimer = 0
      cr.frame = (cr.frame + 1) % 4
    }

    cr.moveProgress += (WALK_SPEED / TILE) * dt
    if (cr.path.length === 0) {
      finishWalk(cr)
      return
    }

    var next = cr.path[0]
    var fromX = cr.col * TILE + TILE / 2
    var fromY = cr.row * TILE + TILE / 2
    var toX = next.col * TILE + TILE / 2
    var toY = next.row * TILE + TILE / 2

    // Update direction
    if (next.col < cr.col) cr.dir = 'LEFT'
    else if (next.col > cr.col) cr.dir = 'RIGHT'
    else if (next.row < cr.row) cr.dir = 'UP'
    else if (next.row > cr.row) cr.dir = 'DOWN'

    var t = Math.min(cr.moveProgress, 1)
    cr.x = fromX + (toX - fromX) * t
    cr.y = fromY + (toY - fromY) * t

    if (cr.moveProgress >= 1) {
      cr.col = next.col
      cr.row = next.row
      cr.x = toX
      cr.y = toY
      cr.path.shift()
      cr.moveProgress = 0

      if (cr.path.length === 0) {
        finishWalk(cr)
        return
      }
    }

    // If active, re-path toward nest
    if (cr.isActive && cr.nest && cr.path.length > 0) {
      var lastStep = cr.path[cr.path.length - 1]
      if (lastStep.col !== cr.nest.col || lastStep.row !== cr.nest.row) {
        var newPath = findPath(cr.col, cr.row, cr.nest.col, cr.nest.row)
        if (newPath.length > 0) cr.path = newPath
      }
    }
  }
}

function finishWalk(cr) {
  var atNest = cr.nest && cr.col === cr.nest.col && cr.row === cr.nest.row
  if (atNest) {
    cr.state = 'WORK'
    cr.frame = 0
    cr.dir = cr.nest.dir
    if (!cr.isActive) {
      cr.restTimer = randRange(REST_MIN, REST_MAX)
      cr.wanderCount = 0
    }
  } else if (cr.isActive) {
    cr.state = 'IDLE'
    cr.frame = 0
  } else {
    if (atNest) {
      cr.state = 'WORK'
      cr.restTimer = randRange(REST_MIN, REST_MAX)
      cr.wanderCount = 0
    } else {
      cr.state = 'IDLE'
      cr.frame = 0
    }
  }
}

// ── Canvas & rendering ───────────────────────────────────────────────────────

var canvas = document.getElementById('game')
var ctx = canvas.getContext('2d')
var zoom = 3
var panX = 0, panY = 0
var waterFrame = 0
var waterTimer = 0

function resizeCanvas() {
  canvas.width = canvas.parentElement.clientWidth
  canvas.height = canvas.parentElement.clientHeight
  ctx.imageSmoothingEnabled = false
}

window.addEventListener('resize', resizeCanvas)
resizeCanvas()

// Rock positions for rendering
var rockPositions = [[10,6],[13,6],[10,9],[13,9],[8,8]]

function renderTerrain(ox, oy) {
  for (var r = 0; r < ROWS; r++) {
    for (var c = 0; c < COLS; c++) {
      var tx = Math.round(ox + c * TILE * zoom)
      var ty = Math.round(oy + r * TILE * zoom)
      var ts = Math.ceil(TILE * zoom)
      var tile = tileMap[r][c]

      if (tile === 0) {
        // Tree
        ctx.fillStyle = '#3a2a1a'
        ctx.fillRect(tx + ts * 0.3, ty + ts * 0.4, ts * 0.4, ts * 0.6)
        ctx.fillStyle = '#1a4a10'
        ctx.fillRect(tx + ts * 0.1, ty, ts * 0.8, ts * 0.55)
        ctx.fillStyle = '#2a6a18'
        ctx.fillRect(tx + ts * 0.2, ty + ts * 0.05, ts * 0.6, ts * 0.4)
      } else if (tile === 1) {
        // Grass checkerboard
        ctx.fillStyle = ((r + c) % 2 === 0) ? '#2d5a1e' : '#275018'
        ctx.fillRect(tx, ty, ts, ts)
        // Occasional grass blade
        if ((r * 7 + c * 13) % 5 === 0) {
          ctx.fillStyle = '#3a7a28'
          var bx = tx + (((r * 3 + c * 7) % 11) / 11) * ts
          ctx.fillRect(bx, ty + ts * 0.3, Math.ceil(zoom), ts * 0.4)
        }
      } else if (tile === 2) {
        // Path
        ctx.fillStyle = ((r + c) % 2 === 0) ? '#8a7a5a' : '#7d6e50'
        ctx.fillRect(tx, ty, ts, ts)
        // Occasional stone
        if ((r * 11 + c * 3) % 7 === 0) {
          ctx.fillStyle = '#9a8a6a'
          ctx.fillRect(tx + ts * 0.3, ty + ts * 0.4, ts * 0.3, ts * 0.2)
        }
      } else if (tile === 3) {
        // Tall grass
        ctx.fillStyle = '#1a4a10'
        ctx.fillRect(tx, ty, ts, ts)
        // Animated tufts
        var sway = (waterFrame % 2 === 0) ? 1 : -1
        ctx.fillStyle = '#2a7a18'
        for (var t = 0; t < 3; t++) {
          var gx = tx + (t * 0.3 + 0.1) * ts + sway * zoom
          ctx.fillRect(gx, ty, Math.ceil(zoom * 2), ts * 0.7)
        }
      } else if (tile === 4) {
        // Water
        var wc = ((r + c + waterFrame) % 2 === 0) ? '#2068b0' : '#1858a0'
        ctx.fillStyle = wc
        ctx.fillRect(tx, ty, ts, ts)
        // Shimmer
        if ((r * 5 + c * 3 + waterFrame) % 4 === 0) {
          ctx.fillStyle = 'rgba(255,255,255,0.3)'
          ctx.fillRect(tx + ts * 0.4, ty + ts * 0.3, Math.ceil(zoom), Math.ceil(zoom))
        }
      }
    }
  }

  // Nests
  for (var i = 0; i < NESTS.length; i++) {
    var n = NESTS[i]
    var nx = Math.round(ox + n.col * TILE * zoom)
    var ny = Math.round(ox + n.row * TILE * zoom)
    // Wait, y uses oy not ox
    ny = Math.round(oy + n.row * TILE * zoom)
    var ns = Math.ceil(TILE * zoom)

    // Brown stump
    ctx.fillStyle = '#5a4020'
    ctx.fillRect(nx + ns * 0.2, ny + ns * 0.5, ns * 0.6, ns * 0.4)
    ctx.fillStyle = '#6a5030'
    ctx.fillRect(nx + ns * 0.15, ny + ns * 0.45, ns * 0.7, ns * 0.15)
    // Green leaf accents
    ctx.fillStyle = '#40a030'
    ctx.fillRect(nx + ns * 0.1, ny + ns * 0.35, ns * 0.25, ns * 0.15)
    ctx.fillRect(nx + ns * 0.65, ny + ns * 0.35, ns * 0.25, ns * 0.15)
  }

  // Rocks
  for (var i = 0; i < rockPositions.length; i++) {
    var rc = rockPositions[i][0], rr = rockPositions[i][1]
    var rx = Math.round(ox + rc * TILE * zoom)
    var ry = Math.round(oy + rr * TILE * zoom)
    var rs = Math.ceil(TILE * zoom)
    ctx.fillStyle = '#6a6a6a'
    ctx.fillRect(rx + rs * 0.2, ry + rs * 0.3, rs * 0.6, rs * 0.5)
    ctx.fillStyle = '#808080'
    ctx.fillRect(rx + rs * 0.25, ry + rs * 0.3, rs * 0.5, rs * 0.3)
  }
}

function renderCreatures(ox, oy) {
  // Y-sort
  var sorted = Array.from(creatures.values()).sort(function(a, b) { return a.y - b.y })

  for (var i = 0; i < sorted.length; i++) {
    var cr = sorted[i]
    var sprite = drawCreature(cr.species, cr.state, cr.dir, cr.frame)
    var sw = 16 * zoom
    var sh = 16 * zoom
    var dx = Math.round(ox + cr.x * zoom - sw / 2)
    var dy = Math.round(oy + cr.y * zoom - sh)

    // Glow for selected
    if (cr.id === selectedId) {
      ctx.save()
      ctx.shadowColor = TYPE_COLORS[cr.species.type] || '#ffffff'
      ctx.shadowBlur = 6 * zoom
      ctx.drawImage(sprite, 0, 0, 16, 16, dx, dy, sw, sh)
      ctx.restore()
    }

    ctx.drawImage(sprite, 0, 0, 16, 16, dx, dy, sw, sh)

    // Bubble
    if (cr.bubbleType) {
      var bx = dx + sw / 2
      var by = dy - 6 * zoom
      var br = 4 * zoom
      ctx.fillStyle = cr.bubbleType === 'alert' ? '#f85848' : '#f0c040'
      ctx.beginPath()
      ctx.arc(bx, by, br, 0, Math.PI * 2)
      ctx.fill()
      ctx.fillStyle = '#ffffff'
      ctx.font = Math.round(5 * zoom) + 'px "Press Start 2P"'
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'
      ctx.fillText(cr.bubbleType === 'alert' ? '!' : '?', bx, by)
    }

    // Status text
    if (cr.isActive && cr.state === 'WORK' && cr.statusText) {
      var stx = dx + sw / 2
      var sty = dy - 4 * zoom
      var fontSize = Math.max(6, Math.round(3.5 * zoom))
      ctx.font = fontSize + 'px "Silkscreen"'
      var metrics = ctx.measureText(cr.statusText)
      var pad = 3 * zoom
      ctx.fillStyle = 'rgba(15,31,10,0.85)'
      ctx.fillRect(stx - metrics.width / 2 - pad, sty - fontSize / 2 - pad / 2, metrics.width + pad * 2, fontSize + pad)
      ctx.fillStyle = '#48d848'
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'
      ctx.fillText(cr.statusText, stx, sty)
    }

    // Name
    var nameFontSize = Math.max(5, Math.round(3 * zoom))
    ctx.font = nameFontSize + 'px "Silkscreen"'
    ctx.fillStyle = TYPE_COLORS[cr.species.type] || '#ffffff'
    ctx.textAlign = 'center'
    ctx.fillText(cr.species.name, dx + sw / 2, dy + sh + nameFontSize + 2)

    // Level
    ctx.fillStyle = '#4a6a38'
    ctx.font = Math.max(4, Math.round(2.5 * zoom)) + 'px "Silkscreen"'
    ctx.fillText('Lv' + cr.level, dx + sw / 2, dy + sh + nameFontSize * 2 + 4)
  }
}

// ── Game loop ────────────────────────────────────────────────────────────────

var lastTime = 0

function gameLoop(ts) {
  requestAnimationFrame(gameLoop)
  var dt = (ts - lastTime) / 1000
  lastTime = ts
  if (dt > 0.1) dt = 0.1 // clamp large dt

  waterTimer += dt
  if (waterTimer >= 0.6) {
    waterTimer = 0
    waterFrame++
  }

  creatures.forEach(function(cr) { updateCreature(cr, dt) })

  ctx.clearRect(0, 0, canvas.width, canvas.height)
  ctx.fillStyle = '#0f1f0a'
  ctx.fillRect(0, 0, canvas.width, canvas.height)

  var mapW = COLS * TILE * zoom
  var mapH = ROWS * TILE * zoom
  var ox = Math.floor((canvas.width - mapW) / 2) + panX
  var oy = Math.floor((canvas.height - mapH) / 2) + panY

  renderTerrain(ox, oy)
  renderCreatures(ox, oy)
}

requestAnimationFrame(gameLoop)

// ── Input handling ───────────────────────────────────────────────────────────

var isDragging = false
var dragStartX = 0, dragStartY = 0
var dragAnchorX = 0, dragAnchorY = 0
var dragMoved = false

canvas.addEventListener('mousedown', function(e) {
  isDragging = true
  dragMoved = false
  dragStartX = e.clientX
  dragStartY = e.clientY
  dragAnchorX = panX
  dragAnchorY = panY
})

window.addEventListener('mousemove', function(e) {
  if (!isDragging) return
  var dx = e.clientX - dragStartX
  var dy = e.clientY - dragStartY
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true
  panX = dragAnchorX + dx
  panY = dragAnchorY + dy
})

window.addEventListener('mouseup', function(e) {
  if (isDragging && !dragMoved) {
    // Click - select creature
    var rect = canvas.getBoundingClientRect()
    var mx = e.clientX - rect.left
    var my = e.clientY - rect.top

    var mapW = COLS * TILE * zoom
    var mapH = ROWS * TILE * zoom
    var ox = Math.floor((canvas.width - mapW) / 2) + panX
    var oy = Math.floor((canvas.height - mapH) / 2) + panY

    var hit = null
    creatures.forEach(function(cr) {
      var sw = 16 * zoom
      var sh = 16 * zoom
      var dx = ox + cr.x * zoom - sw / 2
      var dy = oy + cr.y * zoom - sh
      if (mx >= dx && mx <= dx + sw && my >= dy && my <= dy + sh) {
        hit = cr.id
      }
    })
    selectedId = hit
    updatePartyBar()
  }
  isDragging = false
})

function applyZoom(newZoom, cx, cy) {
  newZoom = Math.max(1, Math.min(6, Math.round(newZoom * 4) / 4))
  if (newZoom === zoom) return
  var ratio = newZoom / zoom
  panX = cx - (cx - panX) * ratio
  panY = cy - (cy - panY) * ratio
  zoom = newZoom
}

var wheelAccum = 0
canvas.addEventListener('wheel', function(e) {
  e.preventDefault()
  var rect = canvas.getBoundingClientRect()
  var mx = e.clientX - rect.left
  var my = e.clientY - rect.top
  // Normalize: mice send big deltas (100+), trackpads send small ones (<10)
  var delta = e.deltaY
  if (e.deltaMode === 1) delta *= 40 // line mode
  wheelAccum += delta
  var threshold = 80
  if (Math.abs(wheelAccum) >= threshold) {
    var step = wheelAccum > 0 ? -0.25 : 0.25
    wheelAccum = 0
    applyZoom(zoom + step, mx, my)
  }
}, { passive: false })

document.getElementById('zoomIn').addEventListener('click', function() {
  applyZoom(zoom + 0.5, canvas.width / 2, canvas.height / 2)
})
document.getElementById('zoomOut').addEventListener('click', function() {
  applyZoom(zoom - 0.5, canvas.width / 2, canvas.height / 2)
})

// ── Party bar ────────────────────────────────────────────────────────────────

function updatePartyBar() {
  var bar = document.getElementById('party-bar')
  bar.innerHTML = ''

  creatures.forEach(function(cr) {
    var div = document.createElement('div')
    div.className = 'party-member' + (cr.id === selectedId ? ' selected' : '')
    div.onclick = function() {
      selectedId = cr.id
      // Center camera on creature
      panX = canvas.width / 2 - cr.x * zoom
      panY = canvas.height / 2 - cr.y * zoom
      updatePartyBar()
    }

    var dot = document.createElement('div')
    dot.className = 'party-dot'
    dot.style.background = TYPE_COLORS[cr.species.type] || '#888'
    div.appendChild(dot)

    var info = document.createElement('div')
    info.className = 'party-info'

    var name = document.createElement('div')
    name.className = 'party-name'
    name.style.color = TYPE_COLORS[cr.species.type] || '#fff'
    name.textContent = cr.species.name
    info.appendChild(name)

    var level = document.createElement('div')
    level.className = 'party-level'
    level.textContent = 'Lv' + cr.level
    info.appendChild(level)

    var hpWrap = document.createElement('div')
    hpWrap.className = 'party-hp'
    var hpFill = document.createElement('div')
    hpFill.className = 'party-hp-fill'
    var hpPct = cr.isActive ? (75 + Math.random() * 25) : (30 + Math.random() * 25)
    hpFill.style.width = hpPct + '%'
    hpFill.style.background = hpPct > 50 ? 'var(--hp-green)' : hpPct > 25 ? 'var(--hp-yellow)' : 'var(--hp-red)'
    hpWrap.appendChild(hpFill)
    info.appendChild(hpWrap)

    var status = document.createElement('div')
    status.className = 'party-status'
    status.textContent = cr.statusText || ''
    info.appendChild(status)

    div.appendChild(info)
    bar.appendChild(div)
  })
}

function updateEncounterCount() {
  document.getElementById('encounter-count').textContent = 'WILD ' + creatures.size + ' FOUND'
}

// ── WebSocket ────────────────────────────────────────────────────────────────

var ws = null
var wsReconnectTimer = null

function connectWS() {
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:'
  ws = new WebSocket(proto + '//' + location.host)

  ws.onopen = function() {
    document.getElementById('statusDot').className = 'status-dot connected'
    document.getElementById('statusText').textContent = 'connected'
  }

  ws.onmessage = function(e) {
    try {
      var m = JSON.parse(e.data)
      handleMsg(m)
    } catch (err) {}
  }

  ws.onclose = function() {
    document.getElementById('statusDot').className = 'status-dot'
    document.getElementById('statusText').textContent = 'disconnected'
    wsReconnectTimer = setTimeout(connectWS, 2000)
  }

  ws.onerror = function() {
    try { ws.close() } catch (err) {}
  }
}

function handleMsg(m) {
  if (!m || !m.type) return
  // Ignore events for sessions that have ended (except session_end itself)
  if (m.sessionId && endedSessions.has(m.sessionId) && m.type !== 'hook_session_end') return
  var cr

  switch (m.type) {
    case 'session_discovered':
      cr = createCreature(m.sessionId, m.speciesIndex)
      if (typeof m.xp === 'number' && m.xp > cr.xp) {
        cr.xp = m.xp
        cr.level = Math.min(100, 1 + Math.floor(cr.xp / 5))
        updatePartyBar()
      }
      break

    case 'tool_start':
    case 'hook_tool_start':
      cancelRemovalTimer(m.sessionId)
      cr = creatures.get(m.sessionId) || createCreature(m.sessionId, m.speciesIndex)
      cr.isActive = true
      cr.statusText = m.status || ('Using ' + (m.toolName || 'tool'))
      if (typeof m.xp === 'number') { cr.xp = m.xp } else { cr.xp++ }
      cr.level = Math.min(100, 1 + Math.floor(cr.xp / 5))
      updatePartyBar()
      break

    case 'tool_done':
    case 'hook_tool_done':
      cr = creatures.get(m.sessionId)
      if (cr) {
        cr.statusText = 'thinking\u2026'
        updatePartyBar()
      }
      break

    case 'agent_active':
      cancelRemovalTimer(m.sessionId)
      cr = creatures.get(m.sessionId) || createCreature(m.sessionId)
      if (!cr.isActive) cr.statusText = 'alert!'
      cr.isActive = true
      updatePartyBar()
      break

    case 'new_turn':
    case 'hook_new_turn':
      cancelRemovalTimer(m.sessionId)
      cr = creatures.get(m.sessionId) || createCreature(m.sessionId)
      cr.isActive = true
      cr.statusText = 'ready!'
      cr.bubbleType = null
      updatePartyBar()
      break

    case 'turn_end':
    case 'hook_stop':
      cr = creatures.get(m.sessionId)
      if (cr) {
        cr.isActive = false
        cr.statusText = 'idle'
        cr.state = 'IDLE'
        updatePartyBar()
      }
      break

    case 'hook_notification':
      cancelRemovalTimer(m.sessionId)
      cr = creatures.get(m.sessionId) || createCreature(m.sessionId)
      if (m.notificationType === 'permission_prompt') {
        cr.bubbleType = 'alert'
        cr.bubbleTimer = 30
        cr.statusText = 'blocked!'
      } else if (m.notificationType === 'idle_prompt') {
        cr.bubbleType = 'question'
        cr.bubbleTimer = 5
        cr.statusText = 'waiting\u2026'
      }
      updatePartyBar()
      break

    case 'hook_subagent_start':
      var subId = m.sessionId + ':' + m.agentId
      cr = createCreature(subId)
      cr.statusText = 'summoned!'
      updatePartyBar()
      break

    case 'hook_subagent_stop':
      var subId2 = m.sessionId + ':' + m.agentId
      removeCreature(subId2)
      break

    case 'hook_session_start':
      endedSessions.delete(m.sessionId)
      cancelRemovalTimer(m.sessionId)
      // If this replaces a cleared session, transfer the old creature to the new session ID
      if (m.replacesSessionId && creatures.has(m.replacesSessionId)) {
        cr = creatures.get(m.replacesSessionId)
        creatures.delete(m.replacesSessionId)
        cr.id = m.sessionId
        creatures.set(m.sessionId, cr)
        if (selectedId === m.replacesSessionId) selectedId = m.sessionId
      } else {
        cr = creatures.get(m.sessionId) || createCreature(m.sessionId, m.speciesIndex)
      }
      cr.isActive = true
      cr.statusText = 'ready!'
      if (typeof m.xp === 'number' && m.xp > cr.xp) {
        cr.xp = m.xp
        cr.level = Math.min(100, 1 + Math.floor(cr.xp / 5))
      }
      updatePartyBar()
      break

    case 'hook_session_clear':
      // /clear — briefly idle the creature but don't kill it
      cr = creatures.get(m.sessionId)
      if (cr) {
        cr.isActive = false
        cr.statusText = 'clearing\u2026'
        updatePartyBar()
      }
      break

    case 'hook_session_end':
      endedSessions.add(m.sessionId)
      removeCreature(m.sessionId)
      break
  }
}

connectWS()

// ── Setup overlay ────────────────────────────────────────────────────────────

setTimeout(function() {
  fetch('/api/status')
    .then(function(r) { return r.json() })
    .then(function(data) {
      if (!data.hooksConfigured) {
        fetch('/api/hooks-config')
          .then(function(r) { return r.json() })
          .then(function(cfg) {
            document.getElementById('hooks-config-pre').textContent = JSON.stringify(cfg, null, 2)
            document.getElementById('setup-overlay').classList.add('visible')
          })
          .catch(function() {})
      }
    })
    .catch(function() {})
}, 500)

document.getElementById('copy-btn').addEventListener('click', function() {
  var text = document.getElementById('hooks-config-pre').textContent
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.getElementById('copy-btn')
    btn.textContent = 'CAUGHT!'
    setTimeout(function() { btn.textContent = 'COPY' }, 2000)
  }).catch(function() {})
})

document.getElementById('close-setup').addEventListener('click', function() {
  document.getElementById('setup-overlay').classList.remove('visible')
})

// ── Init ─────────────────────────────────────────────────────────────────────

initTileMap()
updateEncounterCount()
